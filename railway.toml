[build]
builder = "RAILPACK"
watchPatterns = [
  "/apps/server/**",
  "/packages/shared/**",
  "/package.json",
  "/package-lock.json",
  "/railway.toml"
]

[deploy]
preDeployCommand = "npm run db:migrate"
startCommand = "node apps/server/src/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
